[settings]
python.uv_venv_create_args = ['--seed']
python.uv_venv_auto = true

[tools]
bottom = "latest"
gdu = "latest"
lazygit = "latest"
lua = "5.1"
node = "lts"
perl = "latest"
pnpm = "latest"
poetry = { version = 'latest', pyproject = 'pyproject.toml' }
python = "3.14"
rg = "latest"
ruby = "latest"
uv = "latest"

[tasks.installPerlModule]
description = "Install Perl Module"
run = "cpanm -n Neovim::Ext"
